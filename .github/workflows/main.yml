name: Telegram Notification
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, closed]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram Message
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            MESSAGE="🚀 Push by ${{ github.actor }}"$'\n'"📌 Repo: ${{ github.repository }}"$'\n'"💬 ${{ github.event.head_commit.message }}"
          elif [ "${{ github.event.action }}" = "opened" ]; then
            MESSAGE="🆕 PR Opened by ${{ github.actor }}"$'\n'"🔀 ${{ github.event.pull_request.title }}"$'\n'"🔗 ${{ github.event.pull_request.html_url }}"
          elif [ "${{ github.event.action }}" = "closed" ] && [ "${{ github.event.pull_request.merged }}" = "true" ]; then
            MESSAGE="✅ PR Merged by ${{ github.actor }}"$'\n'"🔀 ${{ github.event.pull_request.title }}"$'\n'"🔗 ${{ github.event.pull_request.html_url }}"
          else
            exit 0
          fi
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "message_thread_id=2" \
            --data-urlencode "text=$MESSAGE"
