version: "3.9"

services:
  db:
    image: postgres:16
    container_name: blood_donation_db
    environment:
      POSTGRES_DB: blood_donation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: blood_donation_backend
    ports:
      - "8081:8081"
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/blood_donation
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

  website:
    build: ./website
    container_name: blood_donation_website
    ports:
      - "3000:3000"
    depends_on:
      - backend

  dashboard:
    build: ./dashboard
    container_name: blood_donation_dashboard
    ports:
      - "3001:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
