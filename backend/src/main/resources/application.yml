---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://db:5432/blood_donation
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  
  # Email Configuration for Docker
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_USERNAME:your-email@gmail.com}
    password: ${GMAIL_APP_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB

server:
  port: 8081

# Custom Application Properties for Docker
jwt:
  secret: ${JWT_SECRET:myVerySecretJwtKeyForBloodDonationSystemThatIsLongEnoughForSecurity}
  expiration: 86400000

file:
  upload-dir: ${UPLOAD_DIR:/app/uploads}
  max-size: 5242880

otp:
